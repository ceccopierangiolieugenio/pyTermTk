name: "pyTermTk CodeQL config"

# Keep analysis focused on source code and avoid generated artifacts.
paths-ignore:
  - build/**
  - tmp/**
  - '**/*.egg-info/**'
  - '**/__pycache__/**'
  - docs/source/_build/**

query-filters:
  # Suppress "Module-level cyclic import" findings.
  - exclude:
      id: py/cyclic-import